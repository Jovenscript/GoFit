<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>Health App - Ultra Premium Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toast-notification" class="toast hidden glass-effect">
    <span id="toast-message">Mensagem</span>
</div>

<div id="confetti-container"></div>

<div id="app-container">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>

    <div id="onboarding-view" class="section hidden">
        <h1 class="fade-in-up gradient-text" id="welcome-text">Bem-vindo! 👋</h1>
        <p class="fade-in-up" style="margin-bottom: 30px; color: var(--text-light); text-align: center; animation-delay: 0.1s;">Vamos esculpir sua melhor versão.</p>
        
        <div class="card glass-effect fade-in-up" style="animation-delay: 0.2s;">
            <div class="form-group">
                <label>Idade</label>
                <input type="number" id="input-age" class="form-control" placeholder="Ex: 29">
            </div>
            <div class="form-group">
                <label>Peso (kg)</label>
                <input type="number" id="input-weight" class="form-control" placeholder="Ex: 75">
            </div>
            <div class="form-group">
                <label>Altura (cm)</label>
                <input type="number" id="input-height" class="form-control" placeholder="Ex: 175">
            </div>
            <div class="form-group">
                <label>Objetivo</label>
                <select id="input-goal" class="form-control">
                    <option value="emagrecer">Emagrecer (Déficit)</option>
                    <option value="manter">Manter o Peso</option>
                    <option value="ganhar">Ganhar Massa (Superávit)</option>
                </select>
            </div>
            <button class="btn btn-primary breathing-glow" onclick="saveProfile()">Gerar Minha Dieta</button>
        </div>
    </div>

    <div id="dashboard-view" class="section hidden">
        <header class="dashboard-header fade-in-up">
            <div class="header-texts">
                <h2 id="greeting-title" class="gradient-text">Olá!</h2>
                <p id="ui-tdee" style="font-size: 14px; color: var(--text-light); font-weight: 500;">Meta: 0 kcal</p>
                <div class="macro-badges">
                    <span id="ui-prot" class="badge-soft glass-effect">P: 0g</span>
                    <span id="ui-carb" class="badge-soft glass-effect">C: 0g</span>
                    <span id="ui-fat" class="badge-soft glass-effect">G: 0g</span>
                </div>
            </div>
            <div class="main-calories glass-effect hover-tilt">
                <span id="ui-calories" class="count-up breathing-text">0</span>
                <small>kcal rest.</small>
            </div>
        </header>

        <section class="app-section fade-in-up" style="animation-delay: 0.1s;">
            <div class="section-header">
                <h3 class="gradient-text-sub">Hidratação</h3>
                <span id="ui-water-status" class="status-badge glass-effect">0 / 0ml</span>
            </div>
            
            <div class="water-dashboard glass-effect">
                <div class="water-ring-container">
                    <svg class="progress-ring" width="120" height="120" style="filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.6));">
                        <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.03)" stroke-width="8" fill="transparent" r="52" cx="60" cy="60"/>
                        <circle id="water-ring" class="progress-ring__circle" stroke="url(#gradient)" stroke-width="8" fill="transparent" r="52" cx="60" cy="60"/>
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#60a5fa" />
                                <stop offset="50%" stop-color="#a855f7" />
                                <stop offset="100%" stop-color="#ec4899" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="water-ring-text gradient-text" id="water-percent">0%</div>
                </div>
                
                <div class="water-actions">
                    <div class="water-btn glass-effect hover-scale" onclick="addWater(200)">
                        <div class="icon-wrapper">💧</div><small>200ml</small>
                    </div>
                    <div class="water-btn glass-effect hover-scale" onclick="addWater(350)">
                        <div class="icon-wrapper">🥛</div><small>350ml</small>
                    </div>
                    <div class="water-btn glass-effect hover-scale" onclick="addWater(500)">
                        <div class="icon-wrapper">🍼</div><small>500ml</small>
                    </div>
                </div>
            </div>
        </section>

        <section class="app-section fade-in-up" style="animation-delay: 0.2s;">
            <div class="section-header">
                <h3 class="gradient-text-sub">Plano Alimentar</h3>
                <span class="status-badge glass-effect">Dieta</span>
            </div>
            <div id="meals-carousel" class="carousel meals-carousel">
                </div>
        </section>

        <div class="card glass-effect fade-in-up" style="margin-top: 20px; animation-delay: 0.3s; margin-bottom: 40px;">
            <h3 class="gradient-text-sub" style="margin-bottom: 20px;">Consumo Hoje</h3>
            <div id="food-log">
                </div>
        </div>
    </div>

    <div id="training-view" class="section hidden">
        <h2 class="fade-in-up gradient-text">Seus Treinos</h2>
        <div class="training-tabs fade-in-up glass-effect" style="animation-delay: 0.1s;">
            <button class="btn btn-tab active-tab" onclick="changeWorkout('A', this)">A</button>
            <button class="btn btn-tab" onclick="changeWorkout('B', this)">B</button>
            <button class="btn btn-tab" onclick="changeWorkout('C', this)">C</button>
        </div>
        
        <div class="card glass-effect fade-in-up" style="animation-delay: 0.2s;">
            <h3 id="workout-title" class="gradient-text-sub">Treino A</h3>
            <div id="workout-list">
                </div>
        </div>
    </div>

    <div id="food-modal" class="modal hidden">
        <div class="modal-content glass-effect">
            <div class="modal-header">
                <h3 id="modal-meal-name" class="gradient-text-sub">Adicionar Alimento</h3>
                <button class="close-btn glass-effect hover-scale" onclick="closeFoodModal()">✕</button>
            </div>
            <div class="food-db-list" id="food-db-list">
                </div>
        </div>
    </div>

    <div id="bottom-nav-bar" class="bottom-nav glass-effect hidden">
        <div class="nav-item active" onclick="switchTab('dashboard')">
            <div class="nav-icon icon-home"></div>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="switchTab('training')">
            <div class="nav-icon icon-dumbbell"></div>
            <span>Treino</span>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
